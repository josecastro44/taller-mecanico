<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSys Sidebar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

        <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            /* Fondo claro para la página principal, para que resalte el menú */
            background-color: #f4f6f9; 
            margin: 0;
        }

        /* Colores personalizados del Sidebar basados en tu imagen */
        .sidebar {
            background-color: #243441; /* Azul oscuro pizarra */
            width: 280px;
            min-height: 100vh;
        }

        .sidebar-brand {
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        .sidebar-brand i {
            color: #8fa5ba; /* Color del icono de la llave */
            transform: rotate(-45deg); /* Inclinación de la llave similar a la imagen */
            display: inline-block;
        }

        /* Estilos de los enlaces de navegación */
        .sidebar .nav-link {
            color: #d1d8e0;
            font-weight: 500;
            padding: 0.8rem 1rem;
            margin-bottom: 0.3rem;
            border-radius: 0.4rem;
            display: flex;
            align-items: center;
            line-height: 1.3;
        }

        .sidebar .nav-link i {
            font-size: 1.2rem;
            min-width: 30px;
        }

        .sidebar .nav-link:hover {
            color: #ffffff;
            background-color: #2c3e4f;
        }

        /* Estado Activo (Dashboard) */
        .sidebar .nav-link.active {
            background-color: #4a5c6d; /* Fondo gris/azulado más claro */
            color: #ffffff;
            font-weight: 600;
        }

        /* Líneas divisorias sutiles */
        .sidebar-divider {
            border-color: rgba(255, 255, 255, 0.08);
            margin: 0;
        }

        /* Sección del Perfil de Usuario */
        .user-profile {
            padding: 1.2rem 1rem;
        }

        .avatar-circle {
            width: 45px;
            height: 45px;
            background-color: #718497;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
        }

        .user-info .user-name {
            color: #ffffff;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .user-info .user-role {
            color: #92a4b5;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="d-flex">
        
        <div class="sidebar d-flex flex-column flex-shrink-0 text-white">
            
            <a href="/" class="d-flex align-items-center justify-content-center text-white text-decoration-none py-4">
                <span class="sidebar-brand fw-bold d-flex align-items-center">
                    <i class="bi bi-wrench me-3"></i> AutoSys
                </span>
            </a>

            <hr class="sidebar-divider">

            <ul class="nav nav-pills flex-column mb-auto p-3">
                <li class="nav-item">
                    <a href="#" class="nav-link active" aria-current="page">
                        <i class="bi bi-grid-1x2 me-2"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <i class="bi bi-car-front me-2"></i> Recepción y O.S.
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <i class="bi bi-clipboard2-check me-2"></i> Servicios (Mano<br>Obra)
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <i class="bi bi-hexagon me-2"></i> Repuestos e Insumos
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <i class="bi bi-people me-2"></i> Empleados y Nómina
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link">
                        <i class="bi bi-receipt me-2"></i> Facturación y<br>Finanzas
                    </a>
                </li>
            </ul>

            <hr class="sidebar-divider">

            <div class="user-profile d-flex align-items-center">
                <div class="avatar-circle me-3">
                    <i class="bi bi-person"></i>
                </div>
                <div class="user-info d-flex flex-column">
                    <span class="user-name">Admin</span>
                    <span class="user-role">Taller Principal</span>
                </div>
            </div>
            
        </div>
        <div class="p-4 w-100">
<input
  type="text"
  value="tbone"
  disabled
  class="invalid:border-pink-500 invalid:text-pink-600 focus:border-sky-500 focus:outline focus:outline-sky-500 focus:invalid:border-pink-500 focus:invalid:outline-pink-500 disabled:border-gray-200 disabled:bg-gray-50 disabled:text-gray-500 disabled:shadow-none dark:disabled:border-gray-700 dark:disabled:bg-gray-800/20 ..."
/>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
